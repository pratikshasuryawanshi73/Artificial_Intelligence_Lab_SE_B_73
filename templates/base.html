<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAgri - Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-leaf brand-icon"></i>
                <h2>SmartAgri</h2>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="{{ url_for('crops_page') }}" class="{% if request.endpoint == 'crops_page' %}active{% endif %}"><i class="fa-solid fa-seedling"></i> Crops</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div class="greeting">
                    <h2 id="dynamicGreeting">Good Day, Farmer!</h2>
                    <p>Here's what's happening on your farm today.</p>
                </div>
                
                <div class="topbar-right">
                    <div class="search-wrap">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" placeholder="Search farm data...">
                    </div>
                    
                    <div class="notification-bell">
                        <i class="fa-solid fa-bell"></i>
                        <div class="bell-dot"></div>
                    </div>
                    
                    <div class="user-profile">
                        <div class="avatar"><i class="fa-solid fa-seedling"></i></div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Script loading -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
